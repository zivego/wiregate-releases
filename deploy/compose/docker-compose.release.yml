services:
  backend:
    image: ${WIREGATE_BACKEND_IMAGE:?WIREGATE_BACKEND_IMAGE is required}
    ports:
      - "${WIREGATE_BIND_ADDRESS:-0.0.0.0}:${WIREGATE_BACKEND_PORT:-8080}:8080"
    environment:
      WIREGATE_HTTP_ADDRESS: ":8080"
      WIREGATE_DB_DRIVER: "${WIREGATE_DB_DRIVER:-sqlite}"
      WIREGATE_SQLITE_PATH: "${WIREGATE_SQLITE_PATH:-/var/lib/wiregate/wiregate.db}"
      WIREGATE_POSTGRES_DSN: "${WIREGATE_POSTGRES_DSN:-}"
      WIREGATE_DATABASE_URL: "${WIREGATE_DATABASE_URL:-}"
      WIREGATE_API_MAX_BODY_BYTES: "${WIREGATE_API_MAX_BODY_BYTES:-1048576}"
      WIREGATE_API_MAX_JSON_BYTES: "${WIREGATE_API_MAX_JSON_BYTES:-65536}"
      WIREGATE_BOOTSTRAP_ADMIN_EMAIL: "${WIREGATE_BOOTSTRAP_ADMIN_EMAIL:-admin@wiregate.local}"
      WIREGATE_BOOTSTRAP_ADMIN_PASSWORD: "${WIREGATE_BOOTSTRAP_ADMIN_PASSWORD:?WIREGATE_BOOTSTRAP_ADMIN_PASSWORD is required}"
      WIREGATE_BOOTSTRAP_ADMIN_PASSWORD_FILE: "${WIREGATE_BOOTSTRAP_ADMIN_PASSWORD_FILE:-}"
      WIREGATE_COOKIE_INSECURE: "${WIREGATE_COOKIE_INSECURE:-false}"
      WIREGATE_WG_SERVER_ENDPOINT: "${WIREGATE_WG_SERVER_ENDPOINT:?WIREGATE_WG_SERVER_ENDPOINT is required}"
      WIREGATE_WG_SERVER_PUBLIC_KEY: "${WIREGATE_WG_SERVER_PUBLIC_KEY:?WIREGATE_WG_SERVER_PUBLIC_KEY is required}"
      WIREGATE_WG_CLIENT_CIDR: "${WIREGATE_WG_CLIENT_CIDR:-10.77.0.0/24}"
      WIREGATE_OIDC_DISPLAY_NAME: "${WIREGATE_OIDC_DISPLAY_NAME:-Single Sign-On}"
      WIREGATE_OIDC_ISSUER_URL: "${WIREGATE_OIDC_ISSUER_URL:-}"
      WIREGATE_OIDC_CLIENT_ID: "${WIREGATE_OIDC_CLIENT_ID:-}"
      WIREGATE_OIDC_CLIENT_SECRET: "${WIREGATE_OIDC_CLIENT_SECRET:-}"
      WIREGATE_OIDC_CLIENT_SECRET_FILE: "${WIREGATE_OIDC_CLIENT_SECRET_FILE:-}"
      WIREGATE_OIDC_REDIRECT_URL: "${WIREGATE_OIDC_REDIRECT_URL:-}"
      WIREGATE_OIDC_SCOPES: "${WIREGATE_OIDC_SCOPES:-openid,profile,email,groups}"
      WIREGATE_OIDC_ADMIN_GROUPS: "${WIREGATE_OIDC_ADMIN_GROUPS:-wiregate-admin,admin}"
      WIREGATE_OIDC_OPERATOR_GROUPS: "${WIREGATE_OIDC_OPERATOR_GROUPS:-wiregate-operator,operator}"
      WIREGATE_OIDC_READONLY_GROUPS: "${WIREGATE_OIDC_READONLY_GROUPS:-wiregate-readonly,readonly}"
      WIREGATE_OIDC_REQUIRED_ADMIN_AMR: "${WIREGATE_OIDC_REQUIRED_ADMIN_AMR:-}"
      WIREGATE_OIDC_REQUIRED_ADMIN_ACR: "${WIREGATE_OIDC_REQUIRED_ADMIN_ACR:-}"
      WIREGATE_OIDC_AUTO_CREATE_USERS: "${WIREGATE_OIDC_AUTO_CREATE_USERS:-true}"
    volumes:
      - wiregate-data:/var/lib/wiregate
    restart: unless-stopped

  frontend:
    image: ${WIREGATE_FRONTEND_IMAGE:?WIREGATE_FRONTEND_IMAGE is required}
    ports:
      - "${WIREGATE_BIND_ADDRESS:-0.0.0.0}:${WIREGATE_FRONTEND_PORT:-5173}:443"
    volumes:
      - "${WIREGATE_TLS_CERT_FILE:?WIREGATE_TLS_CERT_FILE is required}:/etc/nginx/certs/tls.crt:ro"
      - "${WIREGATE_TLS_KEY_FILE:?WIREGATE_TLS_KEY_FILE is required}:/etc/nginx/certs/tls.key:ro"
    restart: unless-stopped

volumes:
  wiregate-data:
