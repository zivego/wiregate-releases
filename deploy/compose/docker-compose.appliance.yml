# ---------------------------------------------------------------------------
# docker-compose.appliance.yml — WireGate all-in-one deployment.
#
# Includes: backend + integrated WireGuard server + frontend.
# WG keys are generated automatically on first boot.
# TLS is optional — mount certs to enable, or use a reverse proxy (Caddy).
#
# Usage:
#   cp .env.appliance.example .env
#   # edit .env — set admin password (that's it!)
#   docker compose -f docker-compose.appliance.yml up -d
# ---------------------------------------------------------------------------

services:
  backend:
    build:
      context: ../../
      dockerfile: deploy/compose/appliance.Dockerfile
    # image: ghcr.io/zivego/wiregate-appliance:latest  # use this for pre-built
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    devices:
      - /dev/net/tun
    ports:
      - "${WIREGATE_WG_LISTEN_PORT:-55182}:${WIREGATE_WG_LISTEN_PORT:-55182}/udp"
    environment:
      WIREGATE_HTTP_ADDRESS: ":8080"
      WIREGATE_DB_DRIVER: "${WIREGATE_DB_DRIVER:-sqlite}"
      WIREGATE_SQLITE_PATH: "${WIREGATE_SQLITE_PATH:-/var/lib/wiregate/wiregate.db}"
      WIREGATE_POSTGRES_DSN: "${WIREGATE_POSTGRES_DSN:-}"
      WIREGATE_BOOTSTRAP_ADMIN_EMAIL: "${WIREGATE_BOOTSTRAP_ADMIN_EMAIL:-admin@wiregate.local}"
      WIREGATE_BOOTSTRAP_ADMIN_PASSWORD: "${WIREGATE_BOOTSTRAP_ADMIN_PASSWORD:?Set WIREGATE_BOOTSTRAP_ADMIN_PASSWORD in .env}"
      WIREGATE_COOKIE_INSECURE: "${WIREGATE_COOKIE_INSECURE:-true}"
      WIREGATE_WG_SERVER_ENDPOINT: "${WIREGATE_WG_SERVER_ENDPOINT:-}"  # auto-detected if empty
      WIREGATE_WG_CLIENT_CIDR: "${WIREGATE_WG_CLIENT_CIDR:-10.77.0.0/24}"
      WIREGATE_WG_SERVER_ADDRESS: "${WIREGATE_WG_SERVER_ADDRESS:-10.77.0.254/24}"
      WIREGATE_WG_LISTEN_PORT: "${WIREGATE_WG_LISTEN_PORT:-55182}"
      # --- Server self-update ---
      # Enabled by default in appliance mode (Docker socket is mounted below).
      # The updater checks WIREGATE_UPDATE_MANIFEST_URL for a JSON manifest
      # like {"latest_version":"v2.0","released_at":"...","changelog_url":"..."}.
      # If an update is available, admin can apply it from the web UI —
      # the backend runs `docker compose pull && docker compose up -d` via the socket.
      # Set WIREGATE_UPDATE_ENABLED=false to disable.
      WIREGATE_UPDATE_ENABLED: "${WIREGATE_UPDATE_ENABLED:-true}"
      WIREGATE_UPDATE_MANIFEST_URL: "${WIREGATE_UPDATE_MANIFEST_URL:-https://raw.githubusercontent.com/zivego/wiregate-releases/main/manifest.json}"
    volumes:
      - wiregate-data:/var/lib/wiregate
      - wg-keys:/etc/wireguard
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qSO /dev/null http://127.0.0.1:8080/api/v1/sessions 2>&1 | grep -q 'HTTP/'"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ../../
      dockerfile: deploy/compose/frontend.Dockerfile
    # image: ghcr.io/zivego/wiregate-frontend:latest  # use this for pre-built
    ports:
      - "${WIREGATE_FRONTEND_PORT:-80}:80"
      - "${WIREGATE_FRONTEND_TLS_PORT:-443}:443"
    volumes:
      # TLS is optional. Set WIREGATE_TLS_CERT_FILE / WIREGATE_TLS_KEY_FILE
      # in .env to enable HTTPS. When unset, /dev/null is mounted as an empty
      # file — the entrypoint detects this and serves plain HTTP on port 80.
      - "${WIREGATE_TLS_CERT_FILE:-/dev/null}:/etc/nginx/certs/tls.crt:ro"
      - "${WIREGATE_TLS_KEY_FILE:-/dev/null}:/etc/nginx/certs/tls.key:ro"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  wiregate-data:
  wg-keys:
