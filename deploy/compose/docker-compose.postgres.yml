services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wiregate
      POSTGRES_USER: wiregate
      POSTGRES_PASSWORD: wiregate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiregate"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
