openapi: 3.0.3
info:
  title: wiregate API
  version: 0.1.0
  description: MVP scaffold OpenAPI document aligned to docs/spec/API_SPEC.md.
servers:
  - url: /api/v1
paths:
  /auth/providers:
    get:
      summary: List configured authentication providers
      responses:
        '200':
          description: Authentication providers for the login UI.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthProvidersResponse'
  /auth/oidc/start:
    get:
      summary: Start OIDC login flow
      responses:
        '302':
          description: Redirect to configured OIDC provider authorization endpoint.
        '404':
          description: OIDC provider is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '503':
          description: OIDC provider discovery/availability failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /auth/oidc/callback:
    get:
      summary: OIDC callback endpoint
      parameters:
        - in: query
          name: state
          required: true
          schema:
            type: string
        - in: query
          name: code
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Successful OIDC login redirects to dashboard or account page.
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: OIDC claims do not satisfy mapped role or policy requirements.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: OIDC provider is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /analytics/dashboard:
    get:
      summary: Get dashboard analytics
      parameters:
        - in: query
          name: range
          schema:
            type: string
            enum: [24h, 7d, 30d]
      responses:
        '200':
          description: Dashboard analytics snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardAnalytics'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
  /analytics/audit:
    get:
      summary: Get audit analytics
      parameters:
        - in: query
          name: range
          schema:
            type: string
            enum: [24h, 7d, 30d]
        - in: query
          name: bucket
          schema:
            type: string
            enum: [hour, day]
      responses:
        '200':
          description: Audit analytics snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditAnalytics'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
  /system/capacity:
    get:
      summary: Get system capacity snapshot
      responses:
        '200':
          description: Current control-plane inventory and queue/export capacity summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapacitySnapshot'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
  /system/version:
    get:
      summary: Get server version (unauthenticated)
      responses:
        '200':
          description: Running server version identity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemVersion'
  /system/update/check:
    get:
      summary: Check for available server updates (admin only)
      responses:
        '200':
          description: Update check result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateCheckResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Server updates are not enabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /system/update/apply:
    post:
      summary: Start server update (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_version]
              properties:
                target_version:
                  type: string
      responses:
        '202':
          description: Update started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Update already in progress.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /system/update/status:
    get:
      summary: Get current update progress (admin only)
      responses:
        '200':
          description: Current update state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Server updates are not enabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /system/cluster:
    get:
      summary: Get cluster leadership status
      responses:
        '200':
          description: Cluster lease/leadership view for this instance.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
        '404':
          description: Cluster status provider is not configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /dns/config:
    get:
      summary: Get managed DNS configuration
      responses:
        '200':
          description: Current DNS policy singleton
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DNSConfig'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
    patch:
      summary: Update managed DNS configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DNSConfig'
      responses:
        '200':
          description: Updated DNS policy singleton
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DNSConfig'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
  /network/diagnostics:
    get:
      summary: Get network diagnostics snapshot
      responses:
        '200':
          description: Current network/gateway diagnostics snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagnosticsSnapshot'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
  /logging/sinks:
    get:
      summary: List configured log export sinks
      responses:
        '200':
          description: Logging sink inventory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogSinkListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
    post:
      summary: Create a log export sink
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogSinkRequest'
      responses:
        '201':
          description: Created sink
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogSink'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
  /logging/sinks/{sink_id}:
    patch:
      summary: Update a log export sink
      parameters:
        - in: path
          name: sink_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogSinkRequest'
      responses:
        '200':
          description: Updated sink
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogSink'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
        '404':
          description: Sink not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
    delete:
      summary: Delete a log export sink
      parameters:
        - in: path
          name: sink_id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Sink deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
        '404':
          description: Sink not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /logging/routes:
    get:
      summary: Get log routing rules and built-in redaction fields
      responses:
        '200':
          description: Log routing configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogRoutesResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
    patch:
      summary: Update log routing rules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogRoutesRequest'
      responses:
        '200':
          description: Updated log routing configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogRoutesResponse'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
  /logging/status:
    get:
      summary: Get current log delivery status
      responses:
        '200':
          description: Queue and per-sink delivery health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoggingStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
  /logging/test-delivery:
    post:
      summary: Enqueue a synthetic log delivery event
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestDeliveryRequest'
      responses:
        '200':
          description: Synthetic test event accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestDeliveryResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
  /security/policies:
    get:
      summary: Get the current security policy singleton
      responses:
        '200':
          description: Current security policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityPolicy'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
    patch:
      summary: Update the current security policy singleton
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchSecurityPolicyRequest'
      responses:
        '200':
          description: Updated security policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityPolicy'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
  /security/approvals:
    get:
      summary: List dual-approval decisions
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, approved, rejected]
        - in: query
          name: limit
          schema:
            type: integer
          deprecated: true
        - in: query
          name: page_size
          schema:
            type: integer
        - in: query
          name: cursor
          schema:
            type: string
      responses:
        '200':
          description: Security approval inventory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityApprovalListResponse'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
  /security/approvals/{approval_id}/{decision}:
    post:
      summary: Approve or reject a pending security action
      parameters:
        - in: path
          name: approval_id
          required: true
          schema:
            type: string
        - in: path
          name: decision
          required: true
          schema:
            type: string
            enum: [approve, reject]
      responses:
        '200':
          description: Security approval decision recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityApprovalDecisionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
        '404':
          description: Approval not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Approval is no longer pending or requires a different admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /sessions:
    get:
      summary: List active sessions
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
          deprecated: true
        - in: query
          name: page_size
          schema:
            type: integer
        - in: query
          name: cursor
          schema:
            type: string
      responses:
        '200':
          description: Active sessions visible to the caller.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
    post:
      summary: Create session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '429':
          $ref: '#/components/responses/RateLimited'
  /sessions/current:
    get:
      summary: Get current session
      responses:
        '200':
          description: Current authenticated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          description: No valid session
    delete:
      summary: Delete current session
      responses:
        '204':
          description: Session revoked
  /sessions/{session_id}/revoke:
    post:
      summary: Revoke one active session
      parameters:
        - in: path
          name: session_id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Session revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
        '404':
          description: Session not found or not visible to the caller.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /users:
    get:
      summary: List users (admin only)
      parameters:
        - in: query
          name: limit
          deprecated: true
          schema:
            type: integer
            minimum: 1
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
        - in: query
          name: cursor
          schema:
            type: string
      responses:
        '200':
          description: User inventory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPage'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
    post:
      summary: Create user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
  /users/{user_id}:
    patch:
      summary: Update user email/role (admin only)
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
    delete:
      summary: Delete user (admin only)
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: User deleted
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
  /users/{user_id}/password-reset:
    post:
      summary: Reset user password (admin only)
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetUserPasswordRequest'
      responses:
        '200':
          description: Password reset completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordActionResponse'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
  /users/me/password:
    post:
      summary: Change current user password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeOwnPasswordRequest'
      responses:
        '200':
          description: Password changed and sessions revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordActionResponse'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
  /users/me/preferences:
    patch:
      summary: Update current user preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOwnPreferencesRequest'
      responses:
        '200':
          description: Current user preferences updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OwnPreferences'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
  /users/me/mfa/totp:
    get:
      summary: Get current user TOTP MFA status
      responses:
        '200':
          description: Current TOTP MFA state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MFATOTPStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/me/mfa/totp/setup:
    post:
      summary: Create or rotate TOTP secret for current user
      responses:
        '200':
          description: New provisioning details. MFA remains disabled until verification.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MFATOTPSetupResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
        '429':
          $ref: '#/components/responses/RateLimited'
  /users/me/mfa/totp/enable:
    post:
      summary: Enable TOTP MFA for current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MFATOTPCodeRequest'
      responses:
        '200':
          description: TOTP MFA enabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MFATOTPStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '429':
          $ref: '#/components/responses/RateLimited'
  /users/me/mfa/totp/disable:
    post:
      summary: Disable TOTP MFA for current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MFATOTPCodeRequest'
      responses:
        '200':
          description: TOTP MFA disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MFATOTPStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '429':
          $ref: '#/components/responses/RateLimited'
  /service-accounts:
    get:
      summary: List service accounts (admin only)
      responses:
        '200':
          description: Service account inventory.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceAccountListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
    post:
      summary: Create service account (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServiceAccountRequest'
      responses:
        '201':
          description: Service account created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceAccount'
        '400':
          $ref: '#/components/responses/ValidationFailed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/PasswordChangeRequired'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '415':
          $ref: '#/components/responses/UnsupportedMediaType'
        '429':
          $ref: '#/components/responses/RateLimited'
