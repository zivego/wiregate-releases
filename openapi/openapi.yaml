components:
  responses:
    ValidationFailed:
      description: Request body or parameters failed validation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Invalid credentials or missing session.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    UnsupportedMediaType:
      description: `Content-Type` must be `application/json` for JSON endpoints.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    PayloadTooLarge:
      description: Request body exceeds configured size limits.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    RateLimited:
      description: Too many requests for the current actor/window.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    PasswordChangeRequired:
      description: Password must be changed before this action is allowed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  schemas:
    ErrorEnvelope:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/Error'
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        request_id:
          type: string
    SystemVersion:
      type: object
      properties:
        version:
          type: string
        commit_sha:
          type: string
        build_time:
          type: string
    UpdateCheckResult:
      type: object
      properties:
        current_version:
          type: string
        latest_version:
          type: string
        update_available:
          type: boolean
        released_at:
          type: string
        changelog_url:
          type: string
        checked_at:
          type: string
    UpdateStatus:
      type: object
      properties:
        state:
          type: string
          enum: [idle, checking, pulling, restarting, failed]
        message:
          type: string
        started_at:
          type: string
    AuthProvidersResponse:
      type: object
      properties:
        providers:
          type: array
          items:
            $ref: '#/components/schemas/OIDCProvider'
    OIDCProvider:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          description: Provider type (`password` or `oidc` for this release).
        enabled:
          type: boolean
        display_name:
